<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merca UP - Tu Tienda Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="container nav-container">
        <div class="logo">Merca UP</div>
        <nav class="main-nav">
          <ul>
            <li><a href="#">INICIO</a></li>
            <li><a href="#">INFO</a></li>
            <li><a href="#">EVENTOS</a></li>
            <li><a href="#">NOSOTROS</a></li>
            <li><a href="#">CONTACTO</a></li>
          </ul>
        </nav>
        <div class="search-icon">🔍</div>
      </div>
    </header>

    <section class="hero-banner">
      <div class="hero-content">
        <div class="hero-image-placeholder">
          <div class="overlay">
            <h1>MERCA UP</h1>
            <p>BIENVENIDOS A TU TIENDA IDEAL</p>
            <button id="btn-cargar" class="btn-enter">ENTRAR</button>
          </div>
        </div>
      </div>
    </section>

    <main class="container">
      <section class="catalog-section">
        <h2>NUESTRO CATÁLOGO</h2>
        <p class="section-subtitle">Explora nuestras últimas novedades</p>
        <div id="catalogo" class="product-grid">
          <p>mejores productos</p>
        </div>
      </section>
    </main>

    <footer class="main-footer">
      <div class="container footer-container">
        <div class="social-icons">
          <a href="#">FB</a>
          <a href="#">TW</a>
          <a href="#">IG</a>
        </div>
        <p>&copy; Merca UP, no vuelva .</p>
      </div>
    </footer>

    <script type="module" src="scripts/productos.js" defer></script>
  </body>
</html>
